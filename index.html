<!DOCTYPE html>
<html>
<head>
  <title>AMEX Portal</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background: #006fcf;
      color: white;
      flex-direction: column;
    }
    .logo { font-size: 48px; font-weight: bold; margin-bottom: 20px; }
    .msg { font-size: 18px; opacity: 0.8; }
    .spinner {
      width: 40px; height: 40px;
      border: 4px solid rgba(255,255,255,0.3);
      border-top: 4px solid white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="logo">AMEX</div>
  <div class="spinner"></div>
  <div class="msg">Connecting to portal...</div>
  <script>
    fetch('config.json?t=' + Date.now())
      .then(r => r.json())
      .then(data => {
        if (data.tunnelUrl) {
          window.location.href = data.tunnelUrl + '/shell/';
        } else {
          document.querySelector('.msg').textContent = 'Portal is offline. Try again later.';
        }
      })
      .catch(() => {
        document.querySelector('.msg').textContent = 'Portal is offline. Try again later.';
      });
  </script>
</body>
</html>
